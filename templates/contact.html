{% extends 'base.html' %}
{% load static %}

{% block content %}

	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 col-xs-12 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s"
					data-wow-offset="0">
					<h1>Contact</h1>
				</div><!-- //.HERO-TEXT -->
			</div><!--- END COL -->
		</div><!--- END CONTAINER -->
	</section>
	<!-- END SECTION TOP -->

	<!-- START CONTACT FORM  -->
	<section class="contact-area section-padding">
		<div class="container">
			<div class="section-title text-center wow zoomIn">
				<h2>Get In touch</h2>
				<div></div>
			</div>
			<div class="row ">
				<div class="col-lg-8 col-sm-8 col-xs-12">
					<div class="single_contact_one">
						<div class="contact">
							<form id="contact-form" method="post" enctype="multipart/form-data">
								<div class="row">
									<div class="form-group col-md-6">
										<input type="text" name="name" class="form-control" placeholder="Name"
											required="required">
									</div>
									<div class="form-group col-md-6">
										<input type="email" name="email" class="form-control" placeholder="Email"
											required="required">
									</div>
									<div class="form-group col-md-12">
										<input type="text" name="subject" class="form-control" placeholder="Subject"
											required="required">
									</div>
									<div class="form-group col-md-12">
										<textarea rows="6" name="message" class="form-control"
											placeholder="Your Message" required="required"></textarea>
									</div>
									<div class="col-md-12 text-center">
										<button type="submit" value="Send message" name="submit" id="submitButton"
											class="btn btn-contact-bg" title="Submit Your Message!">Send
											Message</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div><!-- END COL  -->
				<div class="col-lg-4 col-sm-4 col-xs-12">
					<div class="single_contact_two">
						<div class="single_address">
							<i class="fa fa-rocket color-one"></i>
							<h4>Our Location</h4>
							<p>2369 Robinson Lane Jackson, <br>OH 45640</p>
						</div>
						<div class="single_address">
							<i class="fa fa-phone color-two"></i>
							<h4>Call us on</h4>
							<p>(+1) 216-328-7141 </p>
						</div>
						<div class="single_address single_address_mbnone">
							<i class="fa fa-envelope color-three"></i>
							<h4>Send message</h4>
							<p>admin@example.com</p>
						</div>
					</div>
				</div><!-- END COL  -->
			</div><!-- END ROW -->
		</div><!--- END CONTAINER -->
	</section>
	<!-- END CONTACT FORM -->

	<!-- START MAP -->
	<div class="map">
		<iframe
			src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.957183635167!2d-74.00402768559431!3d40.71895904512855!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2598a1316e7a7%3A0x47bb20eb6074b3f0!2sNew%20Work%20City%20-%20(CLOSED)!5e0!3m2!1sbn!2sbd!4v1600305497356!5m2!1sbn!2sbd"
			style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
	</div>
	<!-- END MAP -->

{% endblock %}
