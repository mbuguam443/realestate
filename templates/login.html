{% extends 'base.html' %}
{% load static %}

{% block content %}

	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 col-xs-12 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s"
					data-wow-offset="0">
					<h1>Login Page</h1>
				</div><!-- //.HERO-TEXT -->
			</div><!--- END COL -->
		</div><!--- END CONTAINER -->
	</section>
	<!-- END SECTION TOP -->

	<!-- START LOGIN -->
	<section class="login_register section-padding">
		<div class="container">
			
			<div class="row">
				   
				<div class="col-lg-6 offset-lg-3 col-sm-12 col-xs-12">
					 <form method="POST">
                        {% csrf_token %}
					<div class="login">
						{% if messages %}
							{% for message in messages %}
								<div class="alert alert-danger">
									{{ message }}
								</div>
							{% endfor %}
						{% endif %} 
						<h4 class="login_register_title">Already a member? Sign in here</h4>
						<div class="form-group">
							<input type="text" id="contact-name" class=" form-control requiredField input-label"
								placeholder="Username" name="username">
						</div>
						<div class="form-group">
							<input type="password" id="contact-email" class="form-control requiredField input-label"
								placeholder="Enter Password" name="password">
						</div>
						<div class="form-group col-md-12 mbnone">
							<button class="btn btn-contact-bg" type="submit" name="submit">login</button>
						</div>
					</div>
					 </form>
				</div><!--- END COL -->
			</div><!--- END ROW -->
		</div><!--- END CONTAINER -->
	</section>
	<!-- END LOGIN -->

	{% endblock %}
