{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Meta -->
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
	<!-- SITE TITLE -->
	<title>{% block title %} Hilux - Real Estate HTML Template {% endblock %}</title>
	<!-- Latest Bootstrap min CSS -->
	<link rel="stylesheet" href="{% static 'assets/bootstrap/css/bootstrap.min.css' %}">
	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet">
	<!-- Font Awesome CSS -->
	<link rel="stylesheet" href="{% static 'assets/fonts/font-awesome.min.css' %}">
	<link rel="stylesheet" href="{% static 'assets/fonts/themify-icons.css' %}">
	<!--- owl carousel Css-->
	<link rel="stylesheet" href="{% static 'assets/owlcarousel/css/owl.carousel.css' %}">
	<link rel="stylesheet" href="{% static 'assets/owlcarousel/css/owl.theme.css' %}">
	<!--fonts icons Css-->
	<link rel="stylesheet" href="{% static 'assets/css/fonts.css' %}">
	<!--prettyPhoto css-->
	<link href="{% static 'assets/css/prettyPhoto.css' %}" rel="stylesheet">
	<!-- MAGNIFIC CSS -->
	<link rel="stylesheet" href="{% static 'assets/css/magnific-popup.css' %}">
	<!-- animate CSS -->
	<link rel="stylesheet" href="{% static 'assets/css/animate.css' %}">
	<!-- Slick css -->
	<link rel="stylesheet" href="{% static 'assets/css/slick.css' %}">
	<!-- Style CSS -->
	<link rel="stylesheet" href="{% static 'assets/css/menu.css' %}">
	<link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
	<link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">
	<!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
	<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
	<!--[if lt IE 9]>
		  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
		  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
		<![endif]-->
</head>

<body data-spy="scroll" data-offset="80">

	<!-- START PRELOADER -->
	<div class="preloader">
		<div class="status">
			<div class="status-mes"></div>
		</div>
	</div>
	<!-- END PRELOADER -->

    {% include 'partials/navbar.html' %}

	{% block content %}
    {% endblock %}

	{% include 'partials/footer.html' %}
</body>

</html>
